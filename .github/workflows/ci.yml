name: CI

# Lint, typecheck, and test on every push and pull request (all branches). The Pages deploy
# (pages.yml) runs the same checks before publishing; this gives fast feedback off main too.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
